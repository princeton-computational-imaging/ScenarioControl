defaults:
- nuplan_base

dataset_path: ${dataset_root}/scenario_control_autoencoder_latents_nuplan # path to dataset of latent cache for training ldm
latent_stats_dir: ${project_root}/metadata/latent_stats # directory to save latent statistics (mean/std across training data for normalization)
latent_stats_path: ${ldm.dataset.latent_stats_dir}/${ldm.model.autoencoder_run_name}.pkl # path to save latent statistics
agent_latents_mean: null # mean of agent latents, to be computed from training data
agent_latents_std: null # std of agent latents, to be computed from training data
lane_latents_mean: null # mean of lane latents, to be computed from training data
lane_latents_std: null # std of lane latents, to be computed from training data

# text conditioning
load_captions: false # if true, load per-scene captions for text conditioning
captions_dir: ${scratch_root}/captions_bev/gpt_bev # directory of cached caption .json files (one per scene, key "BEV")
neg_text: "An unrealistic driving scene." # negative prompt used for classifier-free guidance on non-train splits (val/test)
use_cached_text_embeds: false # if true, read precomputed text embeddings from data['text_embeds']/data['neg_text_embeds'] instead of encoding data['text']/data['neg_text'] on the fly
text_embeds_dir: ${scratch_root}/text_embeds/nuplan # directory of cached text-embedding .pt files (one per scene, plus a shared negative_prompt.pt); only used when use_cached_text_embeds=true

# image conditioning
load_scene_type: null # if set (e.g. '2' or '12'), only load cached scenes whose filename ends in one of these scene-type digits
load_single_img_cond: false # if true, load per-scene DINO features + depth map for image conditioning
img_latents_dir: ${scratch_root}/dino_depth_features/nuplan/dinov3_zoedepth_resized # directory of cached DINO+depth .npz features, normalized to a consistent depth_map shape (see extract_dino_depth_features.py + resize_dino_depth_features.py)
nuplan_data_root: ${nuplan_data_folder} # root dir of the raw nuPlan dataset (contains sensor_blobs/); only used to locate the raw conditioning camera image when visualize_gt=true
dino_feats_shape: [1, "${ldm.model.dino_feat_channels}", "${ldm.model.dino_dim_h}", "${ldm.model.dino_dim_w}"] # zero-fill shape for unconditioned samples; leading 1 becomes the batch dim once PyG concatenates
depth_map_shape: [1, 1, 384, 672] # zero-fill shape for unconditioned samples; must match the native (H, W) resolution extract_dino_depth_features.py saved, since a mismatch breaks batching when conditioned/unconditioned samples share a batch

# unconditional-sample mixing (classifier-free guidance style training)
uncond_dataset_path: null # path to a second latent-cache dataset of genuinely unconditioned (no image) scenes to mix into training
uncond_ratio: 0.0 # fraction of len(files) worth of uncond_dataset_path scenes to append to the training set each epoch
drop_cond_ratio: 0.0 # fraction of already-conditioned training scenes to additionally treat as unconditioned each epoch