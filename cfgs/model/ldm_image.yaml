defaults:
- ldm

# image conditioning
img_conditioning: true
dino_feat_channels: 384 # channel dim of the input DINO patch features
dino_patch_size: 16 # DINO patch size in pixels, used to resize the depth map to match the DINO grid
dino_dim_h: 14 # DINO patch grid height
dino_dim_w: 14 # DINO patch grid width
