defaults:
- base

run_name: scenario_control_ldm_base_nuplan # from base.yaml
lr_schedule: constant # from base.yaml
save_top_k: 0 # only save latest checkpoint
max_steps: 165000 # from base.yaml
warmup_steps: 500 # from base.yaml
weight_decay: 1e-5 # from base.yaml
check_val_every_n_epoch: 2 # from base.yaml
ema_decay: 0.9999 # EMA decay for model weights
guidance_scale: 4.0 # guidance scale for classifier-free guidance
devices: 4 # from base.yaml
num_samples_to_visualize: 10 # from base.yaml
viz_dir: ${project_root}/viz_val_${ldm.train.run_name} # from base.yaml

# this is only computed once at the start of training
num_batches_compute_stats: 250 # number of batches to compute mean/std of latents for normalization
batch_size_compute_stats: 1024 # batch size for computing mean/std of latents

# collision penalty regularizer (requires ldm.model.decode_in_training=true)
collision_weight: 0.0 # weight of the collision penalty loss term, disabled when 0.0
collision_filter_for_vehicles: false # if true, only compute the collision penalty over vehicle agents

# FOV-based loss dropout: agents outside the conditioning camera's FOV are kept in the loss w.p. (1 - fov_dropout_prob)
fov_dropout_prob: 0.0 # disabled when 0.0; requires data['agent'].fov_mask (see ldm.dataset.load_single_img_cond)

# finetuning from a pretrained checkpoint
finetune: false # if true, load pretrained_dir/last.ckpt with strict=False instead of starting from scratch
pretrained_dir: null # directory containing the pretrained checkpoint to finetune from
freeze_pretrained: false # if true (and finetune=true), freeze all weights that loaded from the pretrained checkpoint and only train newly-added ones